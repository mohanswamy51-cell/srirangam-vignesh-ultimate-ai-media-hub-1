<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Srirangam Vignesh AI Multimedia Hub</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #0a0a12; color: #ffffff; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; text-align: center; }
        h1 { color: #88aaff; }
        #botBox { height: 400px; border: 1px solid #333; overflow-y: scroll; padding: 10px; background: #161625; margin-bottom: 10px; text-align: left; border-radius: 8px; }
        .msg { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .user-msg { background: #2b2b40; text-align: right; }
        .ai-msg { background: #3d3d5c; text-align: left; }
        #botInput { width: 70%; padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #88aaff; border: none; border-radius: 5px; cursor: pointer; color: #000; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>SRIRANGAM VIGNESH AI MULTIMEDIA HUB</h1>
        <p>Professional Next-Gen Workspace</p>
        
        <div id="botBox">
            <div class="msg ai-msg">Hi! Srirangam Vignesh garu, welcome back. How can I help you today?</div>
        </div>
        
        <input type="text" id="botInput" placeholder="Send a message to AI...">
        <button onclick="runBot()">ASK AI</button>
    </div>

    <script>
        async function runBot() {
            const input = document.getElementById('botInput');
            const box = document.getElementById('botBox');
            const text = input.value.trim();
            if (!text) return;

            box.innerHTML += `<div class="msg user-msg">${text}</div>`;
            input.value = '';

            try {
                // Backend call
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                
                if (data.reply) {
                    box.innerHTML += `<div class="msg ai-msg">${data.reply}</div>`;
                }
            } catch (e) {
                box.innerHTML += `<div class="msg ai-msg">Error: Check your backend server connection.</div>`;
            }
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
